version: "3.8"

services:
  explorer:
    build: .
    container_name: ela-explorer
    restart: unless-stopped
    network_mode: host
    # Secrets and RPC creds: use the same names the Go binary reads (see .env.example).
    # No ${RPC_USER:?...} here — that breaks when .env only has ELA_NODE_RPC_*.
    env_file:
      - .env
    # Hard ceiling so a memory leak in the indexer/aggregator can't push the
    # host into swap-death. Override via MEM_LIMIT in .env. mem_limit is
    # top-level so it takes effect under `docker compose up` standalone
    # (unlike deploy.resources which is swarm-only by default).
    mem_limit: ${MEM_LIMIT:-4g}
    memswap_limit: ${MEM_LIMIT:-4g}
    # Docker-native liveness probe. /health is the cheap endpoint (no DB
    # roundtrip on the hot path) so this is safe to hit every 30s. On
    # failure, `restart: unless-stopped` restarts the container.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "--max-time", "5", "http://127.0.0.1:8339/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    volumes:
      - ela-data:/app/data
      - ${FRONTEND_HTML:-/opt/ela-explorer/dist/index.html}:/usr/share/nginx/html/index.html:ro
    environment:
      # PostgreSQL (non-secrets only; DB_PASSWORD / DB_API_PASSWORD from .env)
      DB_HOST: "127.0.0.1"
      DB_PORT: "5432"
      DB_NAME: "ela_explorer"
      DB_USER: "ela_indexer"
      DB_SSLMODE: "disable"
      DB_API_USER: "ela_api"

      # ELA Node RPC URL only; ELA_NODE_RPC_USER / ELA_NODE_RPC_PASS from .env
      ELA_NODE_RPC_URL: "http://127.0.0.1:20336"

      # Reference RPCs for cross-checking chain height / block hashes
      REFERENCE_RPC_URLS: "https://rpc.elastos.info/ela,https://api.elastos.io/ela"

      # Server. Bound to LOOPBACK so the API is unreachable from the
      # public internet — nginx is the only ingress and it proxies to
      # 127.0.0.1:8339. Without this clamp the binary listens on
      # 0.0.0.0 (because network_mode: host inherits the host's network
      # namespace), and the endpoint can be hit directly, bypassing
      # nginx caching, rate-limit, and any future WAF / TLS termination.
      LISTEN_ADDR: "127.0.0.1:8339"
      CORS_ORIGINS: "https://explorer.elastos.io,https://explorer.elastos.net"

      # Performance (tuned for 32-core / 128GB)
      UTXO_CACHE_SIZE: "20000000"
      SYNC_BATCH_SIZE: "500"
      DB_SYNCER_POOL_SIZE: "20"
      DB_API_POOL_SIZE: "100"
      LRU_CACHE_SIZE: "50000"
      CACHE_TTL_SECS: "30"
      POLL_INTERVAL_MS: "500"
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "4"
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  ela-data:
