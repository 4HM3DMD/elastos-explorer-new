version: "3.8"

services:
  explorer:
    build: .
    container_name: ela-explorer
    restart: unless-stopped
    network_mode: host
    # Hard ceiling so a memory leak in the indexer/aggregator can't push the
    # host into swap-death. Tune to your box — 8G is conservative for a
    # 32-core/128GB server. Override via MEM_LIMIT in .env.
    mem_limit: ${MEM_LIMIT:-8g}
    memswap_limit: ${MEM_LIMIT:-8g}
    # Docker-native liveness probe. /health is the cheap endpoint (no DB
    # roundtrip on the hot path) so this is safe to hit every 30s. On
    # failure, `restart: unless-stopped` will restart the container.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "--max-time", "5", "http://127.0.0.1:8339/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    volumes:
      - ela-data:/app/data
      - ${FRONTEND_HTML:-/opt/ela-explorer/dist/index.html}:/usr/share/nginx/html/index.html:ro
    environment:
      # PostgreSQL (syncer read-write)
      DB_HOST: "127.0.0.1"
      DB_PORT: "5432"
      DB_NAME: "ela_explorer"
      DB_USER: "ela_indexer"
      DB_PASSWORD: "${DB_PASSWORD:?Set DB_PASSWORD in .env}"
      DB_SSLMODE: "disable"

      # PostgreSQL (API read-only)
      DB_API_USER: "ela_api"
      DB_API_PASSWORD: "${DB_API_PASSWORD:?Set DB_API_PASSWORD in .env}"

      # ELA Node RPC
      ELA_NODE_RPC_URL: "http://127.0.0.1:20336"
      ELA_NODE_RPC_USER: "${RPC_USER:?Set RPC_USER in .env}"
      ELA_NODE_RPC_PASS: "${RPC_PASS:?Set RPC_PASS in .env}"

      # Server
      LISTEN_ADDR: ":8339"
      CORS_ORIGINS: "https://explorer.elastos.io,https://explorer.elastos.net"

      # Performance (tuned for 32-core / 128GB)
      UTXO_CACHE_SIZE: "20000000"
      SYNC_BATCH_SIZE: "500"
      DB_SYNCER_POOL_SIZE: "20"
      DB_API_POOL_SIZE: "100"
      LRU_CACHE_SIZE: "50000"
      CACHE_TTL_SECS: "30"
      POLL_INTERVAL_MS: "500"

volumes:
  ela-data:
