# Prometheus scrape config for ela-explorer.
#
# The /metrics endpoint is token-protected (see internal/api/server.go:109
# → bearerAuthMiddleware + MetricsAuthToken). Set the same token in your
# prometheus environment via METRICS_TOKEN and reference it with
# ${METRICS_TOKEN} below (Prometheus supports env var expansion since 2.43).
#
# Deploy:
#   docker run -d --name prometheus --network host \
#     -v $(pwd)/prometheus.yml:/etc/prometheus/prometheus.yml:ro \
#     -v $(pwd)/rules.yml:/etc/prometheus/rules.yml:ro \
#     -v prometheus_data:/prometheus \
#     -e METRICS_TOKEN="<same as METRICS_AUTH_TOKEN in ela-explorer/.env>" \
#     prom/prometheus:latest --config.file=/etc/prometheus/prometheus.yml \
#     --storage.tsdb.retention.time=30d \
#     --enable-feature=expand-external-labels

global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    deployment: ela-explorer
    env: prod

rule_files:
  - /etc/prometheus/rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            # Uncomment once Alertmanager is deployed:
            # - 127.0.0.1:9093

scrape_configs:
  # The explorer itself. /metrics is behind bearer auth on port 8339.
  - job_name: ela-explorer
    scrape_interval: 15s
    scrape_timeout: 10s
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets:
          - 127.0.0.1:8339
    authorization:
      type: Bearer
      credentials: ${METRICS_TOKEN}

  # Prometheus monitors itself so you notice scrape failures.
  - job_name: prometheus
    static_configs:
      - targets:
          - 127.0.0.1:9090

  # Optional: node_exporter for host-level metrics (CPU, disk, load, NIC).
  # Uncomment once node_exporter is installed.
  # - job_name: node
  #   static_configs:
  #     - targets:
  #         - 127.0.0.1:9100

  # Optional: Postgres exporter (postgres_exporter) for DB-level metrics.
  # Uncomment once running.
  # - job_name: postgres
  #   static_configs:
  #     - targets:
  #         - 127.0.0.1:9187
