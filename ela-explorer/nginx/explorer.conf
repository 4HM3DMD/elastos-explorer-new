# =============================================================================
# Host Nginx config for Elastos Block Explorer
# =============================================================================
#
# Deploy to server:
#   sudo cp ela-explorer/nginx/explorer.conf /etc/nginx/sites-available/ela-explorer
#   sudo ln -sf /etc/nginx/sites-available/ela-explorer /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# After deploy, enable HTTPS:
#   sudo certbot --nginx -d explorer.elastos.io -d explorer.elastos.net
#
# Architecture:
#   Browser -> Nginx (80/443)
#     -> /assets/, /images/, /static/  -> served from disk (fast, cached)
#     -> /api/*, /ws, /ela, /health    -> proxied to Go backend on 127.0.0.1:8339
#     -> / (all other routes)          -> Go backend (injects SEO meta into HTML)
#
# The backend does NOT serve static files. If Nginx proxies /assets/* to the
# backend, the frontend breaks with 404s. This split is critical.
# =============================================================================

# --- Rate limiting zones (applied per client IP) ---
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=rpc:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=sitemap:1m rate=1r/s;
# Tax-CSV export endpoint streams up to 50K rows per request and runs
# on the read-only DB pool. Cap at 2 requests/min/IP with a small burst
# so a scraper cannot bulk-harvest historical wallet activity at speed,
# while a legitimate user can still re-try once or twice on a typo.
limit_req_zone $binary_remote_addr zone=export:1m rate=2r/m;

server {
    listen 80;
    server_name explorer.elastos.io explorer.elastos.net;

    root /opt/ela-explorer/dist;
    index index.html;

    # --- Compression ---
    gzip on;
    gzip_types text/css application/javascript application/json application/xml image/svg+xml;

    # --- Security headers (matching embedded Dockerfile nginx) ---
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' ws: wss:; frame-ancestors 'none';" always;

    # --- Global proxy settings ---
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;
    client_max_body_size 1m;

    # =========================================================================
    # Static assets — served by Nginx directly, NOT proxied to backend
    # =========================================================================

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /images/ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location /static/ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location = /logo.svg {
        expires 30d;
        add_header Cache-Control "public";
    }

    location = /og-default.png {
        expires 30d;
        add_header Cache-Control "public";
    }

    location = /manifest.json {
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    location /static/validator-logos/ {
        alias /opt/ela-explorer/static-validator-logos/;
        autoindex off;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=86400";
    }

    # Cache all static file types that Vite produces
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # =========================================================================
    # Tax-CSV export — streaming, dedicated rate-limit zone
    # =========================================================================
    # Must precede `location /api/` so Nginx's regex match wins over the
    # prefix match. Buffering is disabled so http.Flusher.Flush() in the
    # Go handler reaches the client immediately; read timeout is bumped
    # to 120s to match the per-request deadline enforced inside the
    # handler. Counterparty disclosure is opt-in via the query param;
    # the handler rejects with 413 if the date range yields >50K rows.
    location ~ ^/api/v1/address/[^/]+/export\.csv$ {
        # burst=10 gives the modal headroom for: opening the modal
        # (1 count fetch), clicking through period chips (up to 5
        # debounced count fetches), opening the advanced toggle, and
        # finally hitting Download — all without tripping the limit.
        # Sustained 2r/m still defeats bulk-scraping.
        limit_req zone=export burst=10 nodelay;
        add_header X-Robots-Tag "noindex, nofollow" always;
        proxy_buffering off;
        proxy_read_timeout 120s;
        proxy_pass http://127.0.0.1:8339;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # =========================================================================
    # API — rate-limited, proxied to Go backend
    # =========================================================================

    location /api/ {
        limit_req zone=api burst=60 nodelay;
        add_header X-Robots-Tag "noindex, nofollow" always;
        proxy_pass http://127.0.0.1:8339;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # =========================================================================
    # WebSocket — long-lived connection for live block updates
    # =========================================================================

    location /ws {
        proxy_pass http://127.0.0.1:8339;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # =========================================================================
    # ELA JSON-RPC passthrough — tighter rate limit
    # =========================================================================

    location = /ela {
        limit_req zone=rpc burst=10 nodelay;
        proxy_pass http://127.0.0.1:8339;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # =========================================================================
    # Health, metrics, SEO helpers — proxied to backend
    # =========================================================================

    location = /health {
        proxy_pass http://127.0.0.1:8339;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location = /health/detailed {
        proxy_pass http://127.0.0.1:8339;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # /metrics is internal-only — deny external access
    location /metrics {
        deny all;
        return 403;
    }

    location = /sitemap.xml {
        limit_req zone=sitemap burst=2 nodelay;
        proxy_pass http://127.0.0.1:8339;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /robots.txt {
        proxy_pass http://127.0.0.1:8339;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # =========================================================================
    # SPA fallback — backend injects SEO metadata into index.html
    # =========================================================================
    # Every route not matched above (e.g. /block/123456, /address/...) goes
    # to the Go backend which reads the URL, injects OpenGraph/meta tags into
    # the Vite-built index.html, and returns full HTML for crawlers + browsers.

    location / {
        proxy_pass http://127.0.0.1:8339;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Prevent browsers caching the HTML shell — asset hashes change on every deploy
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    location @backend {
        proxy_pass http://127.0.0.1:8339;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}